# `man 5 sway-input`

input "type:pointer" {
    accel_profile flat
    pointer_accel 0.0
}

input "type:touchpad" {
    accel_profile flat
    pointer_accel 0.0
    natural_scroll enabled
}

input "type:keyboard" {
    xkb_layout "us"
    xkb_options "caps:swapescape"
}

include ./$(hostnamectl hostname)/input.conf

# vim: ft=swayconfig
